{% extends "shared/base.html" %}

{% block content %}
<div class="form-page">
    <div class="form-card large">
        <h1>Add Market</h1>
        <p>The image must be saved in: static/images/markets/Market-Name.jpg</p>

        <form action="/admin_add_market" method="POST">
            <label>Market Name</label>
            <input type="text" name="name" placeholder="Burger House" required>

            <label>Address</label>
            <input type="text" name="address" required>

            <div class="grid-2">
                <div>
                    <label>Latitude</label>
                    <input type="number" step="0.000001" name="latitude" required>
                </div>

                <div>
                    <label>Longitude</label>
                    <input type="number" step="0.000001" name="longitude" required>
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <label>Open Time</label>
                    <input type="time" name="open_time" required>
                </div>

                <div>
                    <label>Close Time</label>
                    <input type="time" name="close_time" required>
                </div>
            </div>

            <button type="submit">Add Market</button>
        </form>

        <a class="secondary-link-dark form-back" href="/admin_markets">Back</a>
    </div>
</div>
{% endblock %}
