{% extends "shared/base.html" %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1>Payment</h1>
        <p>Order #{{ order.id }}</p>

        <div class="payment-box">
            <h2>₪{{ "%.2f"|format(order.total_price if order.total_price else 0) }}</h2>
            <p>Demo card payment. Card details are not saved.</p>
        </div>

        <form action="/demo_pay/{{ order.id }}" method="POST">
            <label>Card Holder Name</label>
            <input type="text" name="card_name" placeholder="Mohammad Bakri" required>

            <label>Card Number</label>
            <input type="text" name="card_number" placeholder="4242 4242 4242 4242" maxlength="19" required>

            <div class="grid-2">
                <div>
                    <label>Expiry Date</label>
                    <input type="text" name="expiry" placeholder="12/28" required>
                </div>

                <div>
                    <label>CVV</label>
                    <input type="password" name="cvv" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <button class="pay-btn" type="submit">Pay Now</button>
        </form>

        <a class="secondary-link-dark" href="/customer">Go Home</a>
    </div>
</div>
{% endblock %}
